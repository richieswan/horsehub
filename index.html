<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HorseHub — Race. Predict. Dominate.</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#05050e;--bg1:#0a0a1a;--bg2:#111126;--bg3:#181835;--bg4:#1f1f42;
  --gold:#f0c040;--gold2:#ffe566;--gold3:#a07820;--goldglow:rgba(240,192,64,.14);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --t1:#f0ead0;--t2:#9a8f6e;--t3:#5a5240;
  --bdr:rgba(240,192,64,.12);--bdr2:rgba(240,192,64,.32);
  --ff:'Cinzel',serif;--fu:'Exo 2',sans-serif;--fs:'Barlow Condensed',sans-serif;
  --r1:6px;--r2:12px;--r3:20px;--r4:28px;
  --tr:.22s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-width:thin;scrollbar-color:var(--gold3) var(--bg1)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px}
body{font-family:var(--fu);background:var(--bg0);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(240,192,64,.01) 60px,rgba(240,192,64,.01) 61px),repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(240,192,64,.01) 60px,rgba(240,192,64,.01) 61px);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}

/* ── Buttons ─────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:var(--r2);border:1.5px solid transparent;font-family:var(--fs);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden;white-space:nowrap;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-gold{background:linear-gradient(135deg,#f0c040,#c89010);color:#0a0800;border-color:#f0c040;box-shadow:0 4px 18px rgba(240,192,64,.3)}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 26px rgba(240,192,64,.5);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--gold);border-color:var(--gold3)}
.btn-outline:hover{border-color:var(--gold);background:var(--goldglow)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--t2);border-color:var(--bdr)}
.btn-ghost:hover{color:var(--t1);border-color:var(--bdr2)}
.btn-red{background:rgba(239,68,68,.14);color:var(--red);border-color:rgba(239,68,68,.35)}
.btn-red:hover{background:rgba(239,68,68,.24)}
.btn-sm{padding:7px 14px;font-size:11px}
.btn-lg{padding:15px 30px;font-size:15px}

/* ── Cards ───────────────────────────────────── */
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r3);padding:22px}
.card-hi{background:var(--bg4);border-color:rgba(240,192,64,.22)}
.card:hover{border-color:var(--bdr2)}

/* ── Badge / Rarity ──────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-family:var(--fs);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.b-common{background:rgba(156,163,175,.14);color:#9ca3af;border:1px solid rgba(156,163,175,.22)}
.b-rare{background:rgba(59,130,246,.14);color:#60a5fa;border:1px solid rgba(59,130,246,.28)}
.b-epic{background:rgba(168,85,247,.14);color:#c084fc;border:1px solid rgba(168,85,247,.28)}
.b-legendary{background:rgba(240,192,64,.14);color:var(--gold);border:1px solid rgba(240,192,64,.38);animation:legpulse 2s ease-in-out infinite}
.b-easy{background:rgba(59,130,246,.14);color:#60a5fa;border:1px solid rgba(59,130,246,.28)}
.b-hard{background:rgba(168,85,247,.14);color:#c084fc;border:1px solid rgba(168,85,247,.28)}
@keyframes legpulse{0%,100%{box-shadow:0 0 6px rgba(240,192,64,.2)}50%{box-shadow:0 0 14px rgba(240,192,64,.5)}}

/* ── Stat bar ────────────────────────────────── */
.sbar-wrap{display:flex;flex-direction:column;gap:4px}
.sbar-row{display:flex;align-items:center;gap:8px}
.sbar-lbl{font-family:var(--fs);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);width:30px;flex-shrink:0}
.sbar-track{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold3),var(--gold));transition:width .9s cubic-bezier(.4,0,.2,1)}
.sbar-val{font-family:var(--fs);font-size:11px;font-weight:700;color:var(--t2);width:22px;text-align:right}

/* ── Navbar ──────────────────────────────────── */
#navbar{position:sticky;top:0;z-index:100;background:rgba(5,5,14,.93);backdrop-filter:blur(18px);border-bottom:1px solid var(--bdr)}
.nav-inner{max-width:1180px;margin:0 auto;padding:0 18px;height:62px;display:flex;align-items:center;gap:24px}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.nav-logo-icon{font-size:22px}
.nav-logo-text{font-family:var(--ff);font-size:19px;font-weight:700;color:var(--gold);letter-spacing:.04em}
.nav-links{list-style:none;display:flex;align-items:center;gap:3px;flex:1}
.nav-link{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r2);text-decoration:none;color:var(--t2);font-family:var(--fs);font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;transition:var(--tr);border:1px solid transparent;cursor:pointer;background:none}
.nav-link:hover{color:var(--t1);background:rgba(240,192,64,.06)}
.nav-link.active{color:var(--gold);background:rgba(240,192,64,.1);border-color:rgba(240,192,64,.2)}
.nav-user{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-coins{display:flex;align-items:center;gap:5px;background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.24);border-radius:100px;padding:5px 13px;font-family:var(--fs);font-weight:700;font-size:13px;color:var(--gold)}
.nav-pill{background:var(--bg3);border:1px solid var(--bdr);border-radius:100px;padding:5px 11px;font-family:var(--fs);font-size:12px;color:var(--t2)}
@media(max-width:760px){.nav-links{display:none}.nav-user .nav-pill{display:none}}

/* ── Page ────────────────────────────────────── */
.pg{max-width:1180px;margin:0 auto;padding:24px 18px 90px;animation:fadeup .45s ease both}
.ph{margin-bottom:28px}
.ph h1{font-family:var(--ff);font-size:clamp(22px,3.5vw,32px);color:var(--gold);margin-bottom:5px}
.ph p{color:var(--t2);font-family:var(--fs);font-size:13px;letter-spacing:.06em;text-transform:uppercase}

/* ── Animations ──────────────────────────────── */
@keyframes fadeup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes scalein{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulsgold{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes shimmer{from{background-position:-200% center}to{background-position:200% center}}
@keyframes conffall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.anim-up{animation:fadeup .45s ease both}
.anim-in{animation:fadein .35s ease both}
.anim-scale{animation:scalein .32s ease both}
.anim-float{animation:float 3s ease-in-out infinite}

/* ── Welcome ─────────────────────────────────── */
#welcome{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 18px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 0%,rgba(240,192,64,.07),transparent 55%)}
.wc{max-width:520px;width:100%;display:flex;flex-direction:column;align-items:center;gap:36px;animation:fadeup .6s ease}
.wlogo h1{font-family:var(--ff);font-size:clamp(40px,8vw,62px);font-weight:900;background:linear-gradient(135deg,#ffe566,#f0c040,#c89010);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.04em;text-align:center;margin-bottom:8px}
.wlogo p{font-family:var(--fs);font-size:12px;letter-spacing:.24em;color:var(--t3);text-transform:uppercase;text-align:center}
.wfeats{width:100%;display:flex;flex-direction:column;gap:9px}
.wfeat{display:flex;align-items:center;gap:13px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r2);padding:11px 15px;font-family:var(--fs);font-size:13px;color:var(--t2);animation:fadeup .5s ease both}
.wfeat span:first-child{font-size:19px;flex-shrink:0}
.wreg{width:100%;display:flex;flex-direction:column;gap:11px}
.wreg label{font-family:var(--fs);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--t2)}
.winput-row{display:flex;gap:10px}
.winput{flex:1;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:var(--r2);padding:13px 17px;font-family:var(--fu);font-size:15px;color:var(--t1);outline:none;transition:var(--tr)}
.winput::placeholder{color:var(--t3)}
.winput:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,192,64,.1)}
.wreg-hint{font-family:var(--fs);font-size:12px;color:var(--t3);text-align:center}
@media(max-width:480px){.winput-row{flex-direction:column}}

/* ── Home ────────────────────────────────────── */
.hero{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--bdr);border-radius:var(--r4);padding:26px;margin-bottom:28px}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.hero-top .emoji{font-size:44px;animation:float 3s ease-in-out infinite}
.hero-name{font-family:var(--ff);font-size:clamp(18px,3vw,26px);margin-bottom:3px}
.hero-name span{color:var(--gold)}
.hero-sub{color:var(--t2);font-family:var(--fs);font-size:12px;letter-spacing:.05em}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.stat-box{flex:1;min-width:72px;background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:var(--r2);padding:11px;text-align:center}
.stat-box-v{font-family:var(--fs);font-size:20px;font-weight:700;color:var(--t1);line-height:1;margin-bottom:3px}
.stat-box-v.gold{color:var(--gold)}
.stat-box-l{font-family:var(--fs);font-size:10px;letter-spacing:.06em;color:var(--t3);text-transform:uppercase}
.xp-bar-wrap{display:flex;flex-direction:column;gap:7px}
.xp-bar-info{display:flex;justify-content:space-between;font-family:var(--fs);font-size:12px;font-weight:700;color:var(--gold)}
.xp-bar-info span:last-child{color:var(--t3);font-weight:400}
.xp-track{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold2));border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.section{margin-bottom:28px}
.section h2{font-family:var(--ff);font-size:19px;color:var(--t1);margin-bottom:14px}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-hdr h2{margin-bottom:0}
.see-all{font-family:var(--fs);font-size:12px;color:var(--gold3);text-decoration:none;cursor:pointer;letter-spacing:.06em;background:none;border:none}
.see-all:hover{color:var(--gold)}
.actions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:600px){.actions-grid{grid-template-columns:repeat(4,1fr)}}
.action-card{display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;padding:19px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r3);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.action-card:hover{border-color:var(--bdr2);transform:translateY(-3px);background:var(--bg4)}
.action-card.gold-action{border-color:rgba(240,192,64,.32);background:linear-gradient(135deg,rgba(240,192,64,.07),var(--bg3));box-shadow:0 0 18px rgba(240,192,64,.09)}
.action-card.gold-action::before{content:'TODAY';position:absolute;top:7px;right:-18px;background:var(--gold);color:#0a0800;font-family:var(--fs);font-size:8px;font-weight:800;letter-spacing:.1em;padding:2px 26px;transform:rotate(28deg)}
.action-icon{font-size:30px}
.action-lbl{font-family:var(--fs);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.action-sub{font-family:var(--fs);font-size:11px;color:var(--t3)}
.daily-preview{margin-bottom:18px}
.dp-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.dp-name{font-family:var(--ff);font-size:16px;color:var(--gold);margin-bottom:7px}
.dp-meta{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--fs);font-size:12px;color:var(--t2)}
.dp-horses{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
@media(min-width:480px){.dp-horses{grid-template-columns:repeat(4,1fr)}}
.dp-horse{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:var(--r2);padding:9px 11px}
.dp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dp-hn{font-family:var(--fs);font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-odds{font-family:var(--fs);font-size:11px;color:var(--t3)}
.done-badge{background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.35);color:var(--green);border-radius:100px;padding:6px 15px;font-family:var(--fs);font-size:12px;font-weight:700;flex-shrink:0}
.mini-lb{display:flex;flex-direction:column;padding:0;overflow:hidden}
.mlb-row{display:flex;align-items:center;gap:13px;padding:13px 19px;border-bottom:1px solid var(--bdr);font-family:var(--fs);font-size:13px;transition:var(--tr)}
.mlb-row:last-child{border-bottom:none}
.mlb-row:hover{background:rgba(255,255,255,.02)}
.mlb-row.me{background:rgba(240,192,64,.06)}
.mlb-rank{font-size:18px;width:28px}
.mlb-name{flex:1;font-weight:700;color:var(--t1)}
.mlb-coins{color:var(--gold);font-weight:700}
.mlb-str{color:var(--t3);min-width:44px;text-align:right}

/* ── Challenge ───────────────────────────────── */
.race-hdr{margin-bottom:24px}
.race-flags{display:flex;gap:7px;margin-bottom:11px}
.race-title{font-family:var(--ff);font-size:clamp(18px,3vw,28px);color:var(--gold);margin-bottom:12px}
.race-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px 18px;margin-bottom:12px}
.race-meta-item{display:flex;align-items:center;gap:7px;font-family:var(--fs);font-size:12px;color:var(--t2)}
.race-desc{font-family:var(--fs);font-size:13px;color:var(--t2);font-style:italic;border-left:3px solid var(--gold3);padding-left:12px;margin-top:9px}
.diff-hint{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.18);border-radius:var(--r2);padding:9px 14px;font-family:var(--fs);font-size:12px;color:var(--t2);margin-top:11px}
.pick-title{font-family:var(--ff);font-size:18px;color:var(--t1);margin-bottom:18px}
.horses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:24px}
@media(max-width:540px){.horses-grid{grid-template-columns:1fr}}
.hpc{background:var(--bg3);border:2px solid var(--bdr);border-radius:var(--r4);padding:17px;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden;animation:fadeup .4s ease both}
.hpc::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,var(--hc,var(--gold)),transparent 55%);opacity:0;transition:var(--tr);pointer-events:none}
.hpc:hover{border-color:var(--bdr2);transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,.4)}
.hpc:hover::after{opacity:.06}
.hpc.selected{border-color:var(--gold);background:var(--bg4);box-shadow:0 0 0 3px rgba(240,192,64,.18),0 12px 28px rgba(0,0,0,.4)}
.hpc.selected::after{opacity:.08}
.hpc-top{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.hpc-bar{width:4px;height:30px;border-radius:2px;background:var(--hc,var(--gold));flex-shrink:0}
.hpc-num{font-family:var(--fs);font-size:12px;color:var(--t3);font-weight:700;letter-spacing:.06em}
.hpc-fav{background:rgba(240,192,64,.14);border:1px solid rgba(240,192,64,.32);color:var(--gold);border-radius:100px;padding:2px 9px;font-family:var(--fs);font-size:10px;font-weight:700}
.hpc-sel-mark{margin-left:auto;width:26px;height:26px;background:var(--gold);color:#0a0800;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.hpc-name{font-family:var(--ff);font-size:16px;color:var(--t1);margin-bottom:5px;line-height:1.3}
.hpc-jock,.hpc-wt{font-family:var(--fs);font-size:11px;color:var(--t3);margin-bottom:2px}
.hpc-odds-block{text-align:center;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:var(--r2);padding:9px;margin:12px 0}
.hpc-odds{font-family:var(--fs);font-size:24px;font-weight:800;color:var(--gold);line-height:1}
.hpc-odds-lbl{font-family:var(--fs);font-size:9px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin-top:2px}
.form-lbl{font-family:var(--fs);font-size:10px;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
.form-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.fp{padding:3px 8px;border-radius:4px;font-family:var(--fs);font-size:10px;font-weight:700;border:1px solid transparent}
.fp.w{background:rgba(34,197,94,.14);color:var(--green);border-color:rgba(34,197,94,.28)}
.fp.p{background:rgba(240,192,64,.11);color:var(--gold);border-color:rgba(240,192,64,.24)}
.fp.o{background:rgba(255,255,255,.05);color:var(--t3)}
.pick-submit{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r3);padding:18px 22px}
.pick-hint{font-family:var(--fs);font-size:13px;color:var(--t2)}
.pick-hint strong{color:var(--gold)}
/* Result */
.result-wrap{display:flex;flex-direction:column;gap:22px;animation:fadein .4s ease}
.result-banner{border-radius:var(--r4);padding:30px;text-align:center;animation:scalein .4s ease}
.result-banner.c{background:linear-gradient(135deg,rgba(34,197,94,.14),rgba(34,197,94,.04));border:2px solid rgba(34,197,94,.38)}
.result-banner.w{background:linear-gradient(135deg,rgba(239,68,68,.11),rgba(239,68,68,.03));border:2px solid rgba(239,68,68,.28)}
.result-banner.n{background:var(--bg3);border:1px solid var(--bdr)}
.result-emoji{font-size:52px;margin-bottom:11px;animation:float 2s ease-in-out infinite}
.result-text{font-family:var(--ff);font-size:clamp(20px,3.5vw,30px);margin-bottom:7px}
.result-sub{font-family:var(--fs);font-size:14px;color:var(--t2)}
.winner-title{font-family:var(--ff);font-size:20px;color:var(--gold);margin-bottom:14px}
.winner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px}
.wh-card{background:var(--bg3);border:1.5px solid var(--bdr);border-radius:var(--r3);padding:15px;text-align:center;position:relative;animation:fadeup .4s ease both;transition:var(--tr)}
.wh-card.winner{border-color:var(--gold);background:var(--bg4);box-shadow:0 0 20px rgba(240,192,64,.14)}
.wh-card.wrong{opacity:.56;border-color:rgba(239,68,68,.28)}
.wh-dot{width:32px;height:32px;border-radius:50%;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.wh-name{font-family:var(--ff);font-size:13px;margin-bottom:3px}
.wh-jock,.wh-odds{font-family:var(--fs);font-size:11px;color:var(--t3)}
.wh-winner-details{display:flex;justify-content:center;gap:11px;margin-top:7px;font-family:var(--fs);font-size:11px;color:var(--t2)}

function uid() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function esc(s){ const d=document.createElement('div');d.textContent=String(s);return d.innerHTML; }
function getDailyRaceIdx(){ return Math.floor(Date.now()/86400000)%RACES.length; }
function getDailyKey(){ return 'daily_'+new Date().toDateString(); }
function getRating(horse){ const s=horse.stats; return Math.round(s.speed*.3+s.stamina*.25+s.acceleration*.25+s.luck*.2); }
function tierLabel(coins){
  if(coins>=5000) return {label:'👑 Legend',color:'var(--gold)'};
  if(coins>=2000) return {label:'💜 Elite',color:'#c084fc'};
  if(coins>=1000) return {label:'⭐ Pro',color:'#60a5fa'};
  return {label:'🐴 Rider',color:'var(--t2)'};
}

function toast(msg, type='gold', dur=3500){
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.textContent = msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>d.remove(), dur);
}

/* ════════════════════════════════════════════════
   CONFETTI
   ════════════════════════════════════════════════ */
function launchConfetti(){
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const COLS = ['#f0c040','#ffe566','#22c55e','#3b82f6','#a855f7','#ef4444','#f97316'];
  const pieces = Array.from({length:90},()=>({
    x:Math.random()*canvas.width, y:-20,
    vx:(Math.random()-.5)*3, vy:2+Math.random()*3,
    rot:Math.random()*360, rotv:(Math.random()-.5)*8,
    size:8+Math.random()*10,
    color:COLS[Math.floor(Math.random()*COLS.length)],
    shape:Math.random()<.5?'rect':'circle'
  }));
  let frame=0;
  const tick = ()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotv; p.vy+=.06;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-frame/120);
      if(p.shape==='rect'){ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);}
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    frame++;
    if(frame<160) requestAnimationFrame(tick);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  };
  requestAnimationFrame(tick);
}

  save();
}

function generateHorse(rarity='common'){
  const statBase = {common:50,rare:60,epic:70,legendary:82}[rarity]||50;
  const statRange = {common:20,rare:18,epic:15,legendary:12}[rarity]||20;
  return {
    id:uid(), name:HORSE_NAMES[rnd(0,HORSE_NAMES.length-1)],
    level:1, xp:0, color:COLORS[rnd(0,COLORS.length-1)], rarity,
    wins:0, races:0, upgrades:{speed:0,stamina:0,acceleration:0,luck:0},
    breedCooldown:null, parents:null,
    stats:{speed:rnd(statBase,statBase+statRange),stamina:rnd(statBase,statBase+statRange),acceleration:rnd(statBase,statBase+statRange),luck:rnd(statBase,statBase+statRange)}
  };
}

function predictRace(raceId, horseId){
  const race = RACES.find(r=>r.id===raceId);
  if(!race) return;
  const key = getDailyKey();
  if(U.dailyResults[key]) return;
  const correct = horseId===race.winner;
  const diff = race.difficulty==='easy'?100:250;
  const streak = correct ? U.streak+1 : 0;
  const coins = correct ? diff + streak*10 : 0;
  const xp = correct ? 50 : 10;
  U.streak = streak;
  if(streak>U.maxStreak) U.maxStreak=streak;
  U.totalPredictions++;
  if(correct) U.totalWins++;
  U.coins += coins;
  U.xp += xp;
  U.dailyResults[key]={raceId,horseId,correct};
  levelCheck();
  save();
  return {correct,coins,streak,race};
}

function levelCheck(){
  const needed = U.level*200;
  if(U.xp>=needed){U.xp-=needed;U.level++;U.coins+=100;toast(`🎉 Level Up! You're now Level ${U.level}! +100 coins bonus!`,'gold',4000);}
}

function upgradeHorse(horseId, stat){
  const horse = U.horses.find(h=>h.id===horseId);
  if(!horse) return;
  const cost = 100+horse.upgrades[stat]*50;
  if(U.coins<cost){toast('Not enough coins!','error');return;}
  if(horse.stats[stat]>=100){toast('Already maxed!','error');return;}
  U.coins-=cost;
  horse.stats[stat]=Math.min(100,horse.stats[stat]+5);
  horse.upgrades[stat]++;
  save();
  toast(`⬆️ ${stat} upgraded! -${cost} coins`,'success');
  render();
}

function breedHorses(id1, id2){
  const h1=U.horses.find(h=>h.id===id1), h2=U.horses.find(h=>h.id===id2);
  if(!h1||!h2) return;
  if(U.coins<300){toast('Need 300 coins to breed!','error');return;}
  const now=Date.now();
  if(h1.breedCooldown&&h1.breedCooldown>now){toast(`${h1.name} is on breeding cooldown!`,'error');return;}
  if(h2.breedCooldown&&h2.breedCooldown>now){toast(`${h2.name} is on breeding cooldown!`,'error');return;}
  U.coins-=300;
  h1.breedCooldown=now+3600000; h2.breedCooldown=now+3600000;
  const roll=Math.random();
  let rarity='common';
  if(roll<.05)rarity='legendary';
  else if(roll<.15)rarity='epic';
  else if(roll<.35)rarity='rare';
  const bonus={common:0,rare:5,epic:10,legendary:20}[rarity];
  const avg = k=>Math.min(100,Math.round((h1.stats[k]+h2.stats[k])/2+(Math.random()*16-8)+bonus));
  const foal={id:uid(),name:HORSE_NAMES[rnd(0,HORSE_NAMES.length-1)],level:1,xp:0,color:COLORS[rnd(0,COLORS.length-1)],rarity,wins:0,races:0,upgrades:{speed:0,stamina:0,acceleration:0,luck:0},breedCooldown:null,parents:[h1.name,h2.name],stats:{speed:avg('speed'),stamina:avg('stamina'),acceleration:avg('acceleration'),luck:avg('luck')}};
  U.horses.push(foal);
  save();
  return foal;
}

function buyHorse(itemId){
  const item=SHOP_ITEMS.find(i=>i.id===itemId);
  if(!item){return;}
  if(U.coins<item.cost){toast(`Need ${item.cost} coins!`,'error');return;}
  U.coins-=item.cost;
  let rarity=item.rarity;
  if(!rarity){const r=Math.random();rarity=r<.05?'legendary':r<.15?'epic':r<.35?'rare':'common';}
  const horse=generateHorse(rarity);
  U.horses.push(horse);
  save();
  const emoji=RARITY_EMOJI[rarity];
  toast(`${emoji} You got a ${rarity.toUpperCase()} horse: ${horse.name}!`,'gold',5000);
  render();
}

function simulateRaceLogic(horseIds){
  const ENTRY=50;
  if(U.coins<ENTRY){toast('Need 50 coins for entry!','error');return null;}
  let racers=[...U.horses.filter(h=>horseIds.includes(h.id))];
  const aiNames=['Phantom','Storm Cloud','Iron Hooves','Dark Horse','Lightning Rod'];
  while(racers.length<4){
    racers.push({id:'ai_'+uid(),name:aiNames[racers.length-horseIds.length]||'AI Horse',color:'#475569',rarity:'common',stats:{speed:rnd(55,80),stamina:rnd(55,80),acceleration:rnd(55,80),luck:rnd(55,80)}});
  }
  U.coins-=ENTRY;
  const scores=racers.map(h=>{
    const s=h.stats;
    const base=s.speed*.3+s.stamina*.25+s.acceleration*.25+s.luck*.2;
    return {horse:h,score:base*(.78+Math.random()*.44)};
  }).sort((a,b)=>b.score-a.score);
  const results=scores.map((s,i)=>({...s.horse,position:i+1}));
  // Update user horses
  const prizes=[200,100,50,0];
  let won=0;
  results.forEach((r,i)=>{
    const uh=U.horses.find(h=>h.id===r.id);
    if(uh){
      uh.races++;
      if(i===0){uh.wins++;uh.xp=(uh.xp||0)+100;if(uh.xp>=(uh.level||1)*150){uh.xp-=(uh.level||1)*150;uh.level=(uh.level||1)+1;['speed','stamina','acceleration','luck'].forEach(s=>uh.stats[s]=Math.min(100,uh.stats[s]+2));}}
      if(prizes[i]){U.coins+=prizes[i];won+=prizes[i];}
    }
  });
  save();
  // Build animation frames
  const frames=[];
  for(let t=0;t<=100;t+=2){
    frames.push(results.map((r,fi)=>{
      const target=t*(1-fi*.015);
      const jitter=(Math.random()-.5)*6;
      return {id:r.id,name:r.name,color:r.color,progress:Math.max(0,Math.min(100,target+jitter))};
    }));
  }
  return {results,frames,won,entryFee:ENTRY};
}

function getLeaderboard(){
  const ai = AI_NAMES.map((name,i)=>({id:'ai_lb_'+i,name,coins:rnd(200,8000),level:rnd(1,12),streak:rnd(0,15),wins:rnd(0,50),predictions:rnd(0,80),isAI:true}));
  ai.forEach(p=>{p.winRate=p.predictions>0?Math.round(p.wins/p.predictions*100):0;});
  const me = {id:U.id,name:U.name,coins:U.coins,level:U.level,streak:U.maxStreak,wins:U.totalWins,predictions:U.totalPredictions,winRate:U.totalPredictions>0?Math.round(U.totalWins/U.totalPredictions*100):0,isMe:true};
  return [...ai,me].sort((a,b)=>b.coins-a.coins).map((p,i)=>({...p,rank:i+1}));
}

              ${win&&race.result?`<div class="wh-winner-details"><span>⏱ ${race.result.winTime}</span><span>📏 ${race.result.margin}</span></div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>
      ${race.result?.positions?`
      <div class="card placements">
        <div class="plc-title">🏁 Full Race Result</div>
        ${race.result.positions.map((hid,i)=>{const h=race.horses.find(x=>x.id===hid);if(!h)return'';const labels=['1st 🥇','2nd 🥈','3rd 🥉'];return`<div class="plc-row"><span class="plc-pos">${labels[i]||i+1+'th'}</span><span class="plc-name">${esc(h.name)}</span><span class="plc-jock">🏇 ${esc(h.jockey)}</span><span class="plc-odds">${esc(h.odds)}</span></div>`;}).join('')}
        ${race.result.winTime||race.result.margin?`<div class="plc-footer">${race.result.winTime?`<span>⏱ ${race.result.winTime}</span>`:''}${race.result.margin?`<span>📏 ${race.result.margin}</span>`:''}</div>`:''}
      </div>`:''}
      <div class="video-card card-hi">
        <div class="video-card-inner">
          <div class="video-thumb-ring"><span>🎬</span></div>
          <div>
            <div class="video-card-title">📺 Watch the Full Race</div>
            <div class="video-card-sub">${esc(race.name)} — ${esc(race.date)}</div>
          </div>
          <div class="video-btns">
            <a class="btn btn-gold btn-lg" href="https://www.youtube.com/results?search_query=${encodeURIComponent(race.videoSearch||race.name+' full race')}" target="_blank" rel="noopener">▶ Find on YouTube</a>

          </div>

}

/* ════════════════════════════════════════════════
   PAGE: STABLE
   ════════════════════════════════════════════════ */

      return `
        <div class="info-box"><p>💡 Upgrade your horse stats by 5 points each. Costs increase with each upgrade level. Max stat: 100.</p></div>
        <div class="horses-mgmt">${U.horses.map(h=>horseCardHTML(h,{showUpgrade:true})).join('')}</div>`;
    }
    if(tab===2){
      const p1=U.horses.find(h=>h.id===G.breedPick1);
      const p2=U.horses.find(h=>h.id===G.breedPick2);
      return `<div class="breed-panel">
        <div class="card breed-info">
          <h3>🧬 Horse Breeding</h3>
          <p>Combine two horses to create a foal! Stats are inherited with variation.</p>
          <div class="breed-rules">
            <div class="breed-rule">💰 Cost: <strong>300 coins</strong></div>
            <div class="breed-rule">⏰ Cooldown: <strong>1 hour</strong></div>
            <div class="breed-rule">🍀 Rare: <strong>20%</strong></div>
            <div class="breed-rule">💜 Epic: <strong>10%</strong></div>
            <div class="breed-rule">👑 Legendary: <strong>5%</strong></div>
          </div>
        </div>
        <div class="breed-parents">
          <div class="bp-slot ${p1?'filled':'empty'}">

        ${G.breedResult?`<div class="breed-result anim-scale"><div class="breed-result-title">${G.breedResult.rarity==='legendary'?'👑 LEGENDARY!':G.breedResult.rarity==='epic'?'💜 EPIC!':G.breedResult.rarity==='rare'?'⭐ RARE!':'🐴 Foal Born!'}</div>${horseCardHTML(G.breedResult)}</div>`:''}
        <div class="breed-select-title" style="margin-bottom:14px">Select two horses to breed:</div>
        <div class="horses-mgmt">
          ${U.horses.map(h=>horseCardHTML(h,{clickable:true,selected:h.id===G.breedPick1||h.id===G.breedPick2,cardAction:'breedSelect',showBreedOverlay:true})).join('')}

    if(tab===3){

        <div class="info-box"><p>🛒 Spend your coins to acquire new horses! Each purchase adds directly to your stable.</p></div>
        <div class="shop-grid">
          ${SHOP_ITEMS.map(item=>`
            <div class="shop-card">
              <div class="shop-emoji anim-float">${item.emoji}</div>

/* ════════════════════════════════════════════════
   PAGE: LEADERBOARD

function pageLeaderboard(){

    if(G.lbSort==='wins')return b.wins-a.wins;
    if(G.lbSort==='streak')return b.streak-a.streak;
    if(G.lbSort==='winRate')return b.winRate-a.winRate;
    return b.coins-a.coins;
  }).map((p,i)=>({...p,displayRank:i+1}));
  const myRank=lb.findIndex(p=>p.isMe)+1;
  const medals=['🥇','🥈','🥉'];
  const sorts=[['coins','🪙 Coins'],['wins','🏆 Wins'],['streak','🔥 Streak'],['winRate','📈 Win Rate']];
  return `<div class="pg">
    <div class="ph">
      <h1>🏆 Leaderboard</h1>
      <p>${myRank>0?`You are ranked #${myRank} globally`:'Complete races to appear on the board'}</p>
    </div>
    <div class="lb-sort">
      ${sorts.map(([k,l])=>`<button class="lb-sort-btn${G.lbSort===k?' active':''}" data-action="lbSort" data-sort="${k}">${l}</button>`).join('')}
    </div>

    <div class="lb-podium">

          <div class="lbp-crown">${medals[i]}</div>
          <div class="lbp-avatar">${p.name.charAt(0).toUpperCase()}</div>
          <div class="lbp-name">${esc(p.name)}${p.isMe?' (you)':''}</div>
          <div class="lbp-val">${G.lbSort==='coins'?'🪙 '+p.coins.toLocaleString():G.lbSort==='wins'?'🏆 '+p.wins:G.lbSort==='streak'?'🔥 '+p.streak:'📈 '+p.winRate+'%'}</div>
          <div class="lbp-tier" style="color:${t.color}">${t.label}</div>
          <div class="lbp-block"></div>
        </div>`;
      }).join('')}
    </div>`:''}
    <div class="card lb-table">
      <div class="lb-head">
        <span>Rank</span><span>Rider</span><span>Lvl</span>
        <span class="lb-col-hide">Wins</span><span class="lb-col-hide">Win %</span>
        <span>Score</span>

      ${lb.map((p,i)=>{
        const t=tierLabel(p.coins);

          <span class="lb-rank">${i<3?medals[i]:'#'+p.displayRank}</span>

          <span class="lb-col-hide lb-stat">${p.wins}</span>
          <span class="lb-col-hide lb-stat">${p.predictions>0?p.winRate+'%':'—'}</span>
          <span class="lb-score">${G.lbSort==='coins'?'🪙 '+p.coins.toLocaleString():G.lbSort==='wins'?'🏆 '+p.wins:G.lbSort==='streak'?'🔥 '+p.streak:'📈 '+p.winRate+'%'}</span>
        </div>`;

    <div class="card my-stats-box">
      <h3>📊 Your Stats</h3>
      <div class="my-stat-grid">

/* ════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════ */
function render(){
  const app=document.getElementById('app');
  if(!U){
    app.innerHTML=pageWelcome();
    const inp=document.getElementById('rname');
    if(inp) inp.focus();
    return;
  }
  let pageHTML='';
  if(G.page==='home') pageHTML=pageHome();
  else if(G.page==='challenge') pageHTML=pageChallenge();
  else if(G.page==='stable') pageHTML=pageStable();
  else if(G.page==='simrace') pageHTML=pageSimRace();
  else if(G.page==='leaderboard') pageHTML=pageLeaderboard();
  app.innerHTML=navbar()+pageHTML;
  if(G.page==='simrace'&&G.simPhase==='racing') startRaceAnimation();
}

/* ════════════════════════════════════════════════
   RACE ANIMATION
   ════════════════════════════════════════════════ */
function startRaceAnimation(){
  if(!G.simData) return;
  const frames=G.simData.frames;
  G.simFrame=0;
  if(G.simTimer) clearInterval(G.simTimer);
  G.simTimer=setInterval(()=>{
    if(G.simFrame>=frames.length){
      clearInterval(G.simTimer);
      setTimeout(()=>{G.simPhase='result';render();},500);
      return;
    }
    const frame=frames[G.simFrame];
    frame.forEach(h=>{
      const fill=document.getElementById('fill-'+h.id);
      const runner=document.getElementById('runner-'+h.id);
      const pct=document.getElementById('pct-'+h.id);
      if(fill) fill.style.width=h.progress+'%';
      if(runner) runner.style.left=`calc(${h.progress}% - 22px)`;
      if(pct) pct.textContent=Math.round(h.progress)+'%';
    });
    G.simFrame++;
  },70);
}

/* ════════════════════════════════════════════════
   EVENTS
   ════════════════════════════════════════════════ */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const action=el.dataset.action;

  if(action==='register'){
    const inp=document.getElementById('rname');
    const name=(inp?.value||'').trim();
    if(!name){inp?.focus();inp?.style.setProperty('border-color','var(--red)');return;}
    createUser(name);
    render();
    toast(`🐎 Welcome, ${name}! You received a horse and 500 coins.`,'gold',5000);
    return;
  }

  if(action==='nav'){
    G.page=el.dataset.page;
    if(G.page==='challenge'){G.challengePhase='pick';G.challengeSelected=null;G.challengeResult=null;}
    if(G.page==='simrace'){if(G.simPhase!=='select'){G.simPhase='select';G.simSelected=[];G.simData=null;}}
    if(G.simTimer) clearInterval(G.simTimer);
    window.scrollTo({top:0,behavior:'smooth'});
    render();
    return;
  }

  if(action==='stableTab'){ G.stableTab=+el.dataset.tab; G.breedResult=null; render(); return; }

  if(action==='pickHorse'&&G.page==='challenge'){
    G.challengeSelected=el.dataset.horse;
    render();
    return;
  }

  if(action==='submitPick'){
    if(!G.challengeSelected) return;
    const race=RACES[getDailyRaceIdx()];
    const res=predictRace(race.id, G.challengeSelected);
    if(res){
      G.challengeResult={correct:res.correct,coins:res.coins,streak:res.streak,horseId:G.challengeSelected,correctHorseId:race.winner};
      G.challengePhase='result';
      if(res.correct) launchConfetti();
      render();
    }
    return;
  }

  if(action==='upgrade'){
    upgradeHorse(el.dataset.horse, el.dataset.stat);
    return;
  }

  if(action==='breedSelect'){
    const hid=el.closest('[data-horse-id]')?.dataset.horseId;
    if(!hid) return;
    const h=U.horses.find(x=>x.id===hid);
    if(!h) return;
    const now=Date.now();
    if(h.breedCooldown&&h.breedCooldown>now){toast(`${h.name} is on breeding cooldown!`,'error');return;}
    if(!G.breedPick1||G.breedPick1===hid){G.breedPick1=(G.breedPick1===hid?null:hid);}
    else if(!G.breedPick2||G.breedPick2===hid){G.breedPick2=(G.breedPick2===hid?null:hid);}
    else{G.breedPick2=hid;}
    G.breedResult=null;
    render();
    return;
  }

  if(action==='clearBreed1'){G.breedPick1=null;G.breedResult=null;render();return;}
  if(action==='clearBreed2'){G.breedPick2=null;G.breedResult=null;render();return;}

  if(action==='doBreed'){
    if(!G.breedPick1||!G.breedPick2) return;
    const foal=breedHorses(G.breedPick1,G.breedPick2);
    if(foal){
      G.breedResult=foal;
      G.breedPick1=null;G.breedPick2=null;
      if(foal.rarity==='legendary'||foal.rarity==='epic') launchConfetti();
      render();
    }
    return;
  }

  if(action==='buyHorse'){
    buyHorse(el.dataset.item);
    return;
  }

  if(action==='simSelect'){
    const hid=el.closest('[data-horse-id]')?.dataset.horseId;
    if(!hid) return;
    G.simSelected=G.simSelected.includes(hid)?G.simSelected.filter(x=>x!==hid):[...G.simSelected,hid];
    render();
    return;
  }

  if(action==='startRace'){
    if(G.simSelected.length===0||U.coins<50) return;
    const data=simulateRaceLogic(G.simSelected);
    if(!data) return;
    G.simData=data;
    G.simPhase='racing';
    render();
    if(data.won>0) setTimeout(()=>toast(`🏆 Your horse won ${data.won} coins!`,'gold',4000),4000);
    return;
  }

  if(action==='resetRace'){
    G.simPhase='select';G.simSelected=[];G.simData=null;
    render();
    return;
  }

  if(action==='lbSort'){G.lbSort=el.dataset.sort;render();return;}
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!U){
    const inp=document.getElementById('rname');
    if(inp&&document.activeElement===inp){
      const name=inp.value.trim();
      if(name){createUser(name);render();toast(`🐎 Welcome, ${name}!`,'gold',4000);}
    }
  }
});

/* ════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════ */
load();
render();
</script>
